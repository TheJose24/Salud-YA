<div
  class="flex min-h-screen items-center justify-center bg-gradient-to-br from-emerald-50 via-teal-50 to-green-50 p-4"
>
  <div class="w-full max-w-md">
    <!-- Header con logo y título -->
    <div class="mb-8 text-center">
      <div
        class="mb-4 inline-flex h-20 w-20 items-center justify-center rounded-3xl bg-emerald-600 shadow-lg"
      >
        <svg class="h-10 w-10 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
          ></path>
        </svg>
      </div>

      <h1 class="mb-2 text-4xl font-bold text-gray-800">Salud Ya</h1>
      <p class="text-sm leading-relaxed text-gray-500">
        Triaje inteligente para postas médicas rurales
      </p>
    </div>

    <!-- Card de login -->
    <div class="mb-6 rounded-2xl bg-white p-8 shadow-xl">
      <form (ngSubmit)="onLogin()" class="space-y-6">
        <!-- Código de posta -->
        <div>
          <label for="codigo" class="mb-2 block text-sm font-semibold text-gray-700">
            Código de posta médica
          </label>
          <input
            id="codigo"
            type="text"
            [(ngModel)]="codigo"
            name="codigo"
            placeholder="EJ: POSTA001"
            [disabled]="isLoading()"
            class="w-full rounded-lg border-2 border-gray-200 px-4 py-3 uppercase text-gray-700 placeholder-gray-400 transition focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-200"
          />
        </div>

        <!-- PIN -->
        <div>
          <label for="pin" class="mb-2 block text-sm font-semibold text-gray-700">
            PIN de 4 dígitos
          </label>
          <input
            id="pin"
            type="password"
            [(ngModel)]="pin"
            name="pin"
            placeholder="••••"
            maxlength="4"
            [disabled]="isLoading()"
            class="w-full rounded-lg border-2 border-gray-200 px-4 py-3 text-center text-lg tracking-widest text-gray-700 placeholder-gray-400 transition focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-200"
          />
        </div>

        <!-- Mensaje de error -->
        <div
          *ngIf="errorMessage()"
          class="rounded-lg border-2 border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700"
        >
          {{ errorMessage() }}
        </div>

        <!-- Botón de login -->
        <button
          type="submit"
          [disabled]="isLoading()"
          class="flex w-full items-center justify-center gap-2 rounded-lg bg-emerald-600 px-4 py-3 font-bold text-white shadow-md transition duration-200 hover:bg-emerald-700 hover:shadow-lg disabled:bg-gray-400"
        >
          <svg *ngIf="!isLoading()" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M12 1c6.075 0 11 4.925 11 11s-4.925 11-11 11S1 18.075 1 12 5.925 1 12 1zm0 2c-4.966 0-9 9-9 9s4.034 9 9 9 9-4.034 9-9-4.034-9-9-9zm3.5 6c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5-1.5-.67-1.5-1.5.67-1.5 1.5-1.5zm-7 0c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5-1.5-.67-1.5-1.5.67-1.5 1.5-1.5zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"
            ></path>
          </svg>
          <span *ngIf="isLoading()" class="inline-block animate-spin">⏳</span>
          {{ isLoading() ? 'Ingresando...' : 'Ingresar' }}
        </button>
      </form>
    </div>

    <!-- Botón para ver cuentas de prueba -->
    <div class="mb-6">
      <button
        type="button"
        (click)="toggleTestAccounts()"
        class="w-full rounded-lg border-2 border-gray-800 px-4 py-2 font-semibold text-gray-800 transition hover:bg-gray-100"
      >
        {{ showTestAccounts() ? 'Ocultar' : 'Ver' }} cuentas de prueba
      </button>
    </div>

    <!-- Cuentas de prueba (expandible) -->
    <div
      *ngIf="showTestAccounts()"
      class="mb-6 rounded-2xl border-2 border-emerald-200 bg-white p-6 shadow-xl"
    >
      <h3 class="mb-4 text-center text-sm font-bold text-gray-700">Cuentas disponibles</h3>
      <div class="space-y-3">
        <button
          type="button"
          (click)="copyAccount('POSTA001', '1234')"
          class="w-full rounded-lg border border-emerald-200 bg-emerald-50 p-3 text-left transition hover:bg-emerald-100"
        >
          <div class="flex items-center justify-between">
            <div>
              <p class="font-semibold text-gray-800">POSTA001</p>
              <p class="text-sm text-gray-600">PIN: 1234</p>
            </div>
            <svg class="h-5 w-5 text-emerald-600" fill="currentColor" viewBox="0 0 24 24">
              <path
                d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"
              ></path>
            </svg>
          </div>
        </button>

        <button
          type="button"
          (click)="copyAccount('POSTA002', '5678')"
          class="w-full rounded-lg border border-teal-200 bg-teal-50 p-3 text-left transition hover:bg-teal-100"
        >
          <div class="flex items-center justify-between">
            <div>
              <p class="font-semibold text-gray-800">POSTA002</p>
              <p class="text-sm text-gray-600">PIN: 5678</p>
            </div>
            <svg class="h-5 w-5 text-teal-600" fill="currentColor" viewBox="0 0 24 24">
              <path
                d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"
              ></path>
            </svg>
          </div>
        </button>

        <button
          type="button"
          (click)="copyAccount('POSTA003', '9012')"
          class="w-full rounded-lg border border-green-200 bg-green-50 p-3 text-left transition hover:bg-green-100"
        >
          <div class="flex items-center justify-between">
            <div>
              <p class="font-semibold text-gray-800">POSTA003</p>
              <p class="text-sm text-gray-600">PIN: 9012</p>
            </div>
            <svg class="h-5 w-5 text-green-600" fill="currentColor" viewBox="0 0 24 24">
              <path
                d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"
              ></path>
            </svg>
          </div>
        </button>
      </div>
    </div>

    <!-- Footer -->
    <div class="space-y-1 text-center text-xs text-gray-500">
      <p>Salud Ya — Universidad Tecnológica del Perú</p>
      <p>Interacción Hombre Máquina 2026</p>
    </div>
  </div>
</div>
